<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0c1117"/>
  <!-- Snowflake/AC unit icon in amber -->
  <!-- Vertical bar -->
  <rect x="15" y="4" width="2" height="24" rx="1" fill="#f59e0b"/>
  <!-- Horizontal bar -->
  <rect x="4" y="15" width="24" height="2" rx="1" fill="#f59e0b"/>
  <!-- Diagonal bars -->
  <rect x="15" y="4" width="2" height="24" rx="1" fill="#f59e0b" transform="rotate(45 16 16)"/>
  <rect x="15" y="4" width="2" height="24" rx="1" fill="#f59e0b" transform="rotate(-45 16 16)"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#0c1117"/>
  <circle cx="16" cy="16" r="1.5" fill="#f59e0b"/>
  <!-- Snowflake tips -->
  <circle cx="16" cy="5" r="1.2" fill="#f59e0b"/>
  <circle cx="16" cy="27" r="1.2" fill="#f59e0b"/>
  <circle cx="5" cy="16" r="1.2" fill="#f59e0b"/>
  <circle cx="27" cy="16" r="1.2" fill="#f59e0b"/>
</svg>
