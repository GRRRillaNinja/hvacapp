<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
const BG_IMAGES = [
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174557/299970.jpg',
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174572/300023.jpg',
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174457/299733.jpg',
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174516/299890.jpg',
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174401/299574.jpg',
    'https://photos.anysex.com/contents/albums/main/1920x9999/174000/174335/299392.jpg',
];
function setRandomBackground() {
    const img = BG_IMAGES[Math.floor(Math.random() * BG_IMAGES.length)];
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-repeat:no-repeat;background-position:center;opacity:0.4;z-index:-1;pointer-events:none;';
    overlay.style.backgroundImage = `url('${img}')`;
    document.body.insertBefore(overlay, document.body.firstChild);
}
document.addEventListener('DOMContentLoaded', setRandomBackground);
</script>
